{% extends "base.html" %}
{% block title %}Staff Login — LGC Portal{% endblock %}
{% block content %}
<div style="max-width:420px;margin:4rem auto;">
  <div style="text-align:center;margin-bottom:2rem;">
    <div style="width:64px;height:64px;background:linear-gradient(135deg,#1e3a5f,#2d5282);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 1rem;border:2px solid var(--border);">🏛</div>
    <h1 style="font-family:'Syne',sans-serif;font-size:1.9rem;font-weight:800;color:var(--text);">Staff Portal</h1>
    <p style="color:var(--muted);font-size:0.9rem;margin-top:4px;">Government employees & administrators only</p>
  </div>
  <div class="card" style="border-color:rgba(56,189,248,0.15);">
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Staff Email <span class="req">*</span></label>
        <input type="email" name="email" class="form-control" placeholder="staff@lgc.gov.pk" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password <span class="req">*</span></label>
        <input type="password" name="password" class="form-control" placeholder="Staff password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:13px;margin-top:0.5rem;background:linear-gradient(135deg,#1e3a5f,#2d5282);color:var(--sky);">
        <i class="fas fa-shield-alt"></i> Secure Login
      </button>
    </form>
    <hr class="divider">
    <div style="text-align:center;font-size:0.87rem;color:var(--muted);">
      Citizen? <a href="/login" style="color:var(--gold);font-weight:600;text-decoration:none;">Citizen login here</a>
    </div>
  </div>
</div>
{% endblock %}
